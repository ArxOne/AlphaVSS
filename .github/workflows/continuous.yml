name: continuous

on: [push]

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
         fetch-depth: 0
      - name: Install build tools
        run: |
            Write-Host "Installing VS 2026 Build Tools..."
            choco install visualstudio2026buildtools `
               --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet" `
               -y --ignore-package-exit-codes=3010
            Write-Host "VS 2026 Build Tools installation completed" 
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: '[18.0,)'
      - name: 'MSBuild found path'
        run: |
            C:\Users\runneradmin\.nuget\packages\vswhere\3.1.7\tools\vswhere.exe -version "[18.0,)" -latest -prerelease -utf8 -property InstallationPath -format value
      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
      - name: 'Run: Push'
        shell: pwsh
        run: ./build.ps1 Push
